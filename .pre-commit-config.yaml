repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && npx eslint src/ --ext js,jsx --max-warnings 0'
        language: system
        files: ^frontend/src/.*\.(js|jsx)$
        pass_filenames: false

      - id: prettier
        name: prettier
        entry: bash -c 'cd frontend && npx prettier --check "src/**/*.{js,jsx,css}"'
        language: system
        files: ^frontend/src/.*\.(js|jsx|css)$
        pass_filenames: false
