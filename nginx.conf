server {
    listen 80;

    # React SPA — serve static files, fall back to index.html for client-side routing
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy all API calls to the FastAPI backend container
    location /api/ {
        proxy_pass http://pointify-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Audio file uploads can be up to 50 MB
        client_max_body_size 55M;

        # Transcription can take a while; don't time out on long uploads
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}
