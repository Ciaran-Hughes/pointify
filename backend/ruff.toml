[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "S", "B", "A", "C4", "PTH", "RUF"]
ignore = ["S101", "S105"]  # allow assert in tests; allow hardcoded password in tests

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S", "B"]   # relax security and bugbear checks in test files
